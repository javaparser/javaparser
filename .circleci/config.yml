# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Define reusable executors for different OS and JDK combinations
executors:
  ubuntu-jdk21:
    docker:
      - image: cimg/openjdk:21.0
    resource_class: large
  ubuntu-jdk25:
    docker:
      - image: cimg/openjdk:25.0
    resource_class: large

# Define a job for running tests
# See: https://circleci.com/docs/guides/orchestrate/jobs-steps/#jobs-overview & https://circleci.com/docs/reference/configuration-reference/#jobs
jobs:
  gradle_test:
    resource_class: large
    parameters:
      executor_name:
        type: string
      jdk_version:
        type: string
    executor: << parameters.executor_name >>
    environment:
      JDK: << parameters.jdk_version >>
    steps:
      # Checkout the code as the first step.
      - checkout

      # Echo exact java version being used
      - run:
          name: "Echo exact java version"
          command: java -version

      # Actually perform the tests with Gradle
      - run:
          name: "Test with Gradle"
          command: |
            chmod +x ./gradlew
            ./gradlew --continue --parallel test

      # Store test results
      - store_test_results:
          path: "**/build/test-results/test/*.xml"

      # Store test artifacts for reporting
      - store_artifacts:
          path: "**/build/reports/tests/test"
          destination: test-report

# Orchestrate jobs using workflows
# See: https://circleci.com/docs/guides/orchestrate/workflows/ & https://circleci.com/docs/reference/configuration-reference/#workflows
workflows:
  gradle_tests_workflow:
    jobs:
      # Ubuntu runners
      - gradle_test:
          name: "test-ubuntu-jdk21"
          executor_name: ubuntu-jdk21
          jdk_version: "21"
